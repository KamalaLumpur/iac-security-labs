name: Terraform Security Scan

on:
  push:
    branches:
      - main
permissions:
  contents: read

jobs:
  checkov-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12.134.0
        with:
          directory: .